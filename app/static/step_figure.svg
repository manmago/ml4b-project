<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Person performing a gym exercise">
  <rect width="100" height="100" fill="#F4F1ED"/>
  <!-- Stick figure performing a dumbbell curl -->
  <g stroke="#1C1B1A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="50" y1="34" x2="50" y2="60"/>            <!-- torso -->
    <line x1="50" y1="60" x2="38" y2="84"/>            <!-- left leg -->
    <line x1="50" y1="60" x2="62" y2="84"/>            <!-- right leg -->
    <path d="M50 39 L33 50 L39 34"/>                   <!-- left arm, curling up -->
    <path d="M50 39 L67 50 L61 34"/>                   <!-- right arm, curling up -->
  </g>
  <circle cx="50" cy="23" r="9" fill="#1C1B1A"/>       <!-- head -->
  <!-- Dumbbells (flame accent) at the hands -->
  <g>
    <rect x="32" y="32" width="14" height="3.4" rx="1.7" fill="#1C1B1A"/>
    <rect x="30.5" y="28" width="3.6" height="11.4" rx="1.8" fill="#FF4D2E"/>
    <rect x="43.9" y="28" width="3.6" height="11.4" rx="1.8" fill="#FF4D2E"/>
    <rect x="54" y="32" width="14" height="3.4" rx="1.7" fill="#1C1B1A"/>
    <rect x="52.5" y="28" width="3.6" height="11.4" rx="1.8" fill="#FF4D2E"/>
    <rect x="65.9" y="28" width="3.6" height="11.4" rx="1.8" fill="#FF4D2E"/>
  </g>
</svg>
