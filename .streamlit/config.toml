# Streamlit configuration for the ML4B app.
#
# We organise the app's pages as importable render() functions inside
# app/pages/ and drive navigation ourselves with a sidebar radio in
# app/streamlit_app.py. Streamlit would otherwise ALSO auto-discover the files
# in app/pages/ and show a second, duplicate navigation widget. Disabling the
# automatic sidebar navigation keeps a single, clean navigation control.
[client]
showSidebarNavigation = false

[server]
# Serve files from app/static/ (the exercise GIFs) over the app's own URL, so the
# app is fully self-contained and needs no internet connection at runtime.
enableStaticServing = true

# "Daylight" theme — clean white surfaces with an orange-red (flame) accent.
# These drive Streamlit's own widgets (progress columns, focus rings, dataframe
# header, file uploader) so the native controls match app/ui/theme.py exactly.
[theme]
base = "light"
primaryColor = "#FF4D2E"              # flame accent (matches theme.FLAME)
backgroundColor = "#FBF9F7"           # app canvas (theme.PAPER)
secondaryBackgroundColor = "#FFFFFF"  # cards / widget surfaces (theme.CARD)
textColor = "#1C1B1A"                 # primary text (theme.INK)
